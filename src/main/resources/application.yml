spring:
  main:
    allow-circular-references: true
  application:
    name: notesapi
  datasource:
    url: jdbc:postgresql://localhost:5432/notesapi
    username: admin
    password: admin
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect